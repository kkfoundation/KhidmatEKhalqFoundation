<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<style>
  body { font-family: Arial, sans-serif; background-color: #ffffff; padding: 20px; margin: 0; }
  label { font-weight: bold; color: #333; display: block; margin-top: 10px; }
  input[type=text], input[type=email], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-top: 6px; margin-bottom: 12px; font-size: 14px; }
  textarea { resize: vertical; min-height: 100px; }
  input[type=submit] { background-color: #1e4620; color: white; padding: 14px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; }
  input[type=submit]:hover { background-color: #143016; }
  #status { font-weight: bold; margin-top: 10px; text-align: center; }
</style>
</head>
<body>

<h3>Contact Us</h3>

<!-- REPLACE YOUR_FORM_ID WITH YOUR ACTUAL FORMSPREE ID STRING -->
<form id="my-form" action="https://formspree.io" method="POST">
  <label>Your Name</label>
  <input type="text" name="name" placeholder="Enter your full name" required>

  <label>Email Address</label>
  <input type="email" name="email" placeholder="Enter your email address" required>

  <label>Message</label>
  <textarea name="message" placeholder="Write your message here" required></textarea>

  <input type="submit" id="submit-btn" value="Send Message">
</form>

<div id="status"></div>

<script>
  var form = document.getElementById("my-form");
  
  async function handleSubmit(event) {
    event.preventDefault();
    var status = document.getElementById("status");
    var data = new FormData(event.target);
    status.innerHTML = "Sending...";
    
    fetch(event.target.action, {
      method: form.method,
      body: data,
      headers: {
          'Accept': 'application/json'
      }
    }).then(response => {
      if (response.ok) {
        status.innerHTML = "Thanks for your submission! Your message was sent.";
        status.style.color = "green";
        form.reset()
      } else {
        response.json().then(data => {
          if (Object.hasOwn(data, 'errors')) {
            status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
          } else {
            status.innerHTML = "Oops! There was a problem submitting your form";
          }
          status.style.color = "red";
        })
      }
    }).catch(error => {
      status.innerHTML = "Oops! There was a problem submitting your form";
      status.style.color = "red";
    });
  }
  form.addEventListener("submit", handleSubmit)
</script>

</body>
</html>
